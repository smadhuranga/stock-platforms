server:
  port: 8761

spring:
  application:
    name: service-registry
  config:
    import: "optional:configserver:"
  cloud:
    config:
      uri: http://config.platform:8888

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
